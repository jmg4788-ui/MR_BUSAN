<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2048 Premium - Cozy Pastel</title>
  <!-- Google Fonts: Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <!-- CSS Link -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="stars-bg"></div>
  
  <div class="game-wrapper">
    <!-- 헤더 영역 -->
    <header class="game-header">
      <div class="brand-section">
        <h1 class="logo-title">2048 <span class="highlight">PREMIUM</span></h1>
        <p class="logo-subtitle">Merge tiles to reach the neon core</p>
      </div>
      
      <div class="scores-container">
        <div class="score-box" id="score-box-current">
          <span class="score-label">SCORE</span>
          <span class="score-value" id="current-score">0</span>
        </div>
        <div class="score-box" id="score-box-best">
          <span class="score-label">BEST</span>
          <span class="score-value" id="best-score">0</span>
        </div>
      </div>
    </header>

    <!-- 도구 및 액션 영역 -->
    <section class="control-panel">
      <div class="action-buttons">
        <button class="btn btn-action" id="btn-undo" title="실행 취소 (점수 50% 차감, 단축키 1)">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 7v6h6M21 17a9 9 0 00-9-9 9 9 0 00-6 2.3L3 13"/>
          </svg>
          <span>Undo</span>
        </button>
        <button class="btn btn-action" id="btn-shuffle" title="랜덤 셔플 (점수 30% 차감, 단축키 2)">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 11-.57-8.38l5.67-5.67"/>
          </svg>
          <span>Shuffle</span>
        </button>
        <button class="btn btn-action" id="btn-swap" title="타일 스왑 (점수 70% 차감, 단축키 3)">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M16 3h5v5M4 20L21 3M8 21H3v-5M12 12l-8 8"/>
          </svg>
          <span>Swap</span>
        </button>
      </div>
      
      <div class="utility-buttons">
        <button class="btn btn-util" id="btn-ranking" title="랭킹 보기">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
          </svg>
          <span>Ranking</span>
        </button>
        <button class="btn btn-util btn-highlight" id="btn-newgame">
          <span>New Game</span>
        </button>
      </div>
    </section>

    <!-- 메인 게임 보드 -->
    <main class="game-container">
      <!-- 배경 그리드 (4x4) -->
      <div class="grid-container">
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
      </div>

      <!-- 동적으로 타일이 렌더링될 컨테이너 -->
      <div class="tile-container"></div>
    </main>

    <!-- 하단 설명 및 저작권 -->
    <footer class="game-footer">
      <p>HOW TO PLAY: Use your <strong>arrow keys</strong> or <strong>WASD</strong> to move the tiles.</p>
      <p>Press <strong>New Game</strong> to restart the board at any time.</p>
    </footer>
  </div>

  <!-- 랭킹 모달 -->
  <div class="modal-overlay hidden" id="ranking-modal">
    <div class="modal-content glass-card">
      <div class="modal-header">
        <h2>DAILY RANKING</h2>
        <button class="btn-close" id="btn-close-ranking">&times;</button>
      </div>
      <div class="modal-body">
        <ul class="ranking-list" id="ranking-list-container">
          <!-- JavaScript에 의해 동적으로 랭킹 엔트리가 생성됩니다. -->
        </ul>
      </div>
    </div>
  </div>
  
  <!-- 게임 오버 / 승리 오버레이 -->
  <div class="game-message-overlay hidden" id="game-status-overlay">
    <div class="message-content">
      <h2 class="message-title" id="message-title">GAME OVER</h2>
      <p class="message-desc" id="message-desc">No moves left. Keep pushing the limits!</p>
      <div class="message-actions">
        <button class="btn btn-highlight" id="btn-overlay-action">Try Again</button>
      </div>
    </div>
  </div>

  <!-- 외부 게임 엔진 JavaScript 파일 연동 -->
  <script src="game.js"></script>
</body>
</html>
