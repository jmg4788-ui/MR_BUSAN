<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>심플 투두 리스트 (Simple Todo List)</title>
    <!-- Google Fonts에서 가독성이 좋고 현대적인 Inter 폰트 로드 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* 변수 정의: 앱 전체에서 사용할 색상과 테마 스타일을 관리합니다. (초보자 권장 패턴) */
        :root {
            --bg-color: #0f172a;        /* 전체 화면 배경: 어두운 네이비색 */
            --card-bg: #1e293b;         /* 카드 컨테이너 배경: 조금 밝은 네이비색 */
            --text-main: #f8fafc;       /* 핵심 글자 색상: 흰색에 가까운 회색 */
            --text-muted: #64748b;      /* 부가 설명/완료된 항목 글자 색상: 어두운 회색 */
            --accent-color: #6366f1;    /* 포인트 색상: 인디고 블루 (보라빛 파란색) */
            --accent-hover: #4f46e5;    /* 마우스 호버 시 포인트 색상 */
            --danger-color: #ef4444;    /* 삭제 버튼 테마 색상 (빨간색) */
            --border-radius: 12px;      /* 요소들의 둥글기 */
            --transition-speed: 0.2s;   /* 상태 변화 시 부드러운 애니메이션 시간 */
        }

        /* 1. 기본 스타일 초기화 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box; /* 패딩과 테두리를 포함한 크기 계산 */
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center; /* 가로 중앙 정렬 */
            align-items: center;     /* 세로 중앙 정렬 */
            padding: 20px;
        }

        /* 2. 할 일 목록 카드 디자인 */
        .todo-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 440px;
            border-radius: var(--border-radius);
            padding: 30px;
            /* 세련된 그림자 효과 */
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 
                        0 8px 10px -6px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05); /* 얇은 테두리로 입체감 부여 */
        }

        /* 제목 그라데이션 디자인 */
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 24px;
            text-align: center;
            background: linear-gradient(135deg, #a5b4fc, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 3. 입력 폼 레이아웃 */
        .todo-form {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        /* 입력창 디자인 */
        .todo-input {
            flex: 1; /* 가용 공간을 모두 차지하도록 설정 */
            padding: 12px 16px;
            border-radius: var(--border-radius);
            border: 1px solid #334155;
            background-color: #0f172a;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: border-color var(--transition-speed);
        }

        /* 입력창에 커서가 올라갔을 때(포커스) */
        .todo-input:focus {
            border-color: var(--accent-color);
        }

        /* 추가 버튼 디자인 */
        .add-button {
            padding: 12px 20px;
            border-radius: var(--border-radius);
            border: none;
            background-color: var(--accent-color);
            color: #ffffff;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color var(--transition-speed), transform 0.1s;
        }

        .add-button:hover {
            background-color: var(--accent-hover);
        }

        .add-button:active {
            transform: scale(0.95); /* 누를 때 살짝 들어가는 효과 */
        }

        /* 4. 할 일 아이템 리스트 디자인 */
        .todo-list {
            list-style: none; /* 기본 점 모양 제거 */
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 각 투두 아이템 */
        .todo-item {
            display: flex;
            align-items: center;
            justify-content: space-between; /* 양 끝 정렬 */
            padding: 14px 16px;
            background-color: #0f172a;
            border-radius: var(--border-radius);
            border: 1px solid #1e293b;
            transition: all var(--transition-speed);
            animation: slideIn 0.3s ease-out; /* 추가될 때 나타나는 애니메이션 */
        }

        /* 등장 애니메이션 정의 */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 아이템 내 체크박스와 텍스트 그룹 */
        .todo-content {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            cursor: pointer;
        }

        /* 커스텀 원형 체크박스 */
        .checkbox {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-speed);
        }

        /* 마우스 호버 시 체크박스 테두리 강조 */
        .todo-content:hover .checkbox {
            border-color: var(--accent-color);
        }

        /* 완료 상태의 체크박스 스타일 */
        .todo-item.completed .checkbox {
            border-color: var(--accent-color);
            background-color: var(--accent-color);
        }

        /* 체크박스 내의 체크 표시 (✓) */
        .checkbox::after {
            content: "✓";
            color: #ffffff;
            font-size: 13px;
            font-weight: bold;
            display: none;
        }

        /* 완료되었을 때만 체크 표시 보이기 */
        .todo-item.completed .checkbox::after {
            display: block;
        }

        /* 할 일 텍스트 */
        .todo-text {
            font-size: 1rem;
            color: var(--text-main);
            transition: all var(--transition-speed);
        }

        /* 완료 상태의 할 일 텍스트 (줄 긋기 및 흐리게 처리) */
        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        /* 5. 삭제 버튼 디자인 */
        .delete-button {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            transition: all var(--transition-speed);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 삭제 버튼 호버 시 밝은 빨간색으로 변경 */
        .delete-button:hover {
            color: var(--danger-color);
            background-color: rgba(239, 68, 68, 0.1);
        }

        /* 목록이 비어 있을 때 문구 */
        .empty-message {
            text-align: center;
            color: var(--text-muted);
            padding: 30px 0;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <div class="todo-container">
        <h1>✨ My Task Planner</h1>
        
        <!-- 할 일 입력 폼 (Enter 키 입력 시에도 작동할 수 있게 form 형태로 제작) -->
        <form id="todo-form" class="todo-form">
            <input 
                type="text" 
                id="todo-input" 
                class="todo-input" 
                placeholder="새로운 할 일을 입력하세요..." 
                autocomplete="off"
            >
            <button type="submit" class="add-button">추가</button>
        </form>

        <!-- 할 일 목록이 렌더링될 곳 -->
        <ul id="todo-list" class="todo-list">
            <!-- 자바스크립트에 의해 채워집니다 -->
        </ul>
    </div>

    <script>
        // DOM 요소 가져오기
        const todoForm = document.getElementById('todo-form');
        const todoInput = document.getElementById('todo-input');
        const todoList = document.getElementById('todo-list');

        // localStorage 키 정의
        const STORAGE_KEY = 'simple_todos';

        // 안전하게 localStorage에서 데이터 불러오기
        function loadTodos() {
            try {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    const parsed = JSON.parse(stored);
                    if (Array.isArray(parsed)) {
                        return parsed;
                    }
                }
            } catch (error) {
                console.error("로컬 스토리지 데이터 로드 실패 (초기화):", error);
                // 파싱할 수 없는 깨진 데이터가 들어있는 경우 리셋
                try {
                    localStorage.removeItem(STORAGE_KEY);
                } catch (e) {}
            }
            return [];
        }

        // 안전하게 localStorage에 데이터 저장하기
        function saveTodos() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
            } catch (error) {
                console.error("로컬 스토리지 저장 실패:", error);
            }
        }

        // 할 일 목록 데이터 배열을 스토리지에서 안전하게 읽어옵니다.
        let todos = loadTodos();

        // 1. 할 일 추가 기능
        function addTodo(text) {
            // 입력값이 유효한지 검사 (공백만 있는 경우 무시)
            if (text.trim() === '') return;

            // 고유 ID는 중복을 피하기 위해 현재 시간값(밀리초)을 사용합니다.
            const newTodo = {
                id: Date.now(),
                text: text.trim(),
                completed: false
            };

            // 데이터 배열에 새로 생성된 할 일 객체 추가
            todos.push(newTodo);

            // 입력창 비우기
            todoInput.value = '';

            // 로컬 스토리지 동기화 및 렌더링
            saveTodos();
            renderTodos();
        }

        // 2. 할 일 완료 상태 변경 (Toggle) 기능
        function toggleTodo(id) {
            // map() 함수를 활용하여, 클릭된 id와 일치하는 항목만 completed 상태를 반대로 바꿔줍니다.
            todos = todos.map(todo => {
                if (todo.id === id) {
                    return { ...todo, completed: !todo.completed };
                }
                return todo;
            });

            // 로컬 스토리지 동기화 및 렌더링
            saveTodos();
            renderTodos();
        }

        // 3. 할 일 삭제 기능
        function deleteTodo(id) {
            // filter() 함수를 사용하여 클릭된 id와 다른 할 일만 새로운 배열로 남깁니다. (결과적으로 해당 id 요소만 제외됨)
            todos = todos.filter(todo => todo.id !== id);

            // 로컬 스토리지 동기화 및 렌더링
            saveTodos();
            renderTodos();
        }

        // 4. 화면 렌더링(그리기) 기능
        // 이 함수는 todos 배열에 있는 상태를 그대로 HTML 화면으로 출력해줍니다.
        function renderTodos() {
            // 기존에 화면에 떠있던 할 일 목록 태그를 전부 깨끗하게 비웁니다.
            todoList.innerHTML = '';

            // 만약 등록된 할 일이 하나도 없는 경우
            if (todos.length === 0) {
                todoList.innerHTML = '<li class="empty-message">오늘 해야 할 일을 등록해보세요! 🚀</li>';
                return;
            }

            // todos 배열 안의 할 일 객체들을 순회하며 화면 요소를 제작합니다.
            todos.forEach(todo => {
                // (1) 목록 리스트 item (li) 생성
                const li = document.createElement('li');
                li.className = `todo-item ${todo.completed ? 'completed' : ''}`;

                // (2) 체크박스와 텍스트를 감쌀 영역 생성
                const todoContent = document.createElement('div');
                todoContent.className = 'todo-content';
                // 클릭 시 해당 아이템의 완료 상태 토글 함수 실행
                todoContent.addEventListener('click', () => toggleTodo(todo.id));

                // (3) 원형 커스텀 체크박스 생성
                const checkbox = document.createElement('div');
                checkbox.className = 'checkbox';

                // (4) 할 일 내용 텍스트 노드 생성
                const todoText = document.createElement('span');
                todoText.className = 'todo-text';
                todoText.textContent = todo.text;

                // 영역(todoContent)에 체크박스와 텍스트 조립
                todoContent.appendChild(checkbox);
                todoContent.appendChild(todoText);

                // (5) 삭제 버튼 생성 (가볍고 선명한 SVG 아이콘 사용)
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-button';
                deleteBtn.innerHTML = `
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>
                `;
                // 삭제 버튼 클릭 시 해당 아이템 삭제 함수 실행
                // (주의: 버튼 클릭 이벤트가 부모 div의 toggle 이벤트로 전파(버블링)되는 것을 막아야 합니다.)
                deleteBtn.addEventListener('click', (event) => {
                    event.stopPropagation(); // 이벤트 버블링(전파) 중단
                    deleteTodo(todo.id);
                });

                // 최종적으로 한 줄의 아이템(li)에 내용물과 삭제 버튼을 부착
                li.appendChild(todoContent);
                li.appendChild(deleteBtn);

                // 화면의 ul태그 자식 요소로 삽입
                todoList.appendChild(li);
            });
        }

        // 5. 이벤트 리스너 등록
        // 사용자가 입력 폼을 제출(Submit - 추가 버튼 클릭 또는 엔터 키 입력)할 때 실행될 동작 정의
        todoForm.addEventListener('submit', (event) => {
            event.preventDefault(); // 폼 제출 시 웹페이지가 새로고침되는 것을 방지합니다.
            addTodo(todoInput.value);
        });

        // 앱이 처음 시작될 때 빈 리스트 메시지를 띄우기 위해 렌더링을 한 번 실행합니다.
        renderTodos();
    </script>
</body>
</html>
