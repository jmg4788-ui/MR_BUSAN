<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>간단한 퍼즐 게임</title>
    <!-- Google Fonts - Noto Sans KR -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Reset & Variable Definitions */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-color: #f3f5f9;
            --container-bg: #ffffff;
            --text-color: #1f2937;
            --text-muted: #6b7280;
            --primary-blue: #1a73e8;
            --primary-blue-hover: #1557b0;
            --card-back-grad: linear-gradient(135deg, #a7f3d0 0%, #86efac 100%);
            --card-front-bg: #c2f0d0;
            --font-family: 'Noto Sans KR', sans-serif;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Game Container Layout */
        .game-wrapper {
            background-color: var(--container-bg);
            border-radius: 28px;
            box-shadow: 0 16px 36px rgba(0, 0, 0, 0.04), 0 4px 12px rgba(0, 0, 0, 0.02);
            padding: 40px;
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s ease;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            color: #111827;
        }

        .subtitle {
            font-size: 14.5px;
            font-weight: 400;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 32px;
        }

        .game-controls {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .attempts {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-color);
            user-select: none;
        }

        .btn-restart {
            background-color: var(--primary-blue);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 10px 20px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            outline: none;
            box-shadow: 0 4px 6px rgba(26, 115, 232, 0.15);
        }

        .btn-restart:hover {
            background-color: var(--primary-blue-hover);
        }

        .btn-restart:active {
            transform: scale(0.96);
        }

        /* 4x4 Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            width: 100%;
            margin-bottom: 28px;
        }

        /* Card Component & Flip Effect */
        .card {
            aspect-ratio: 1 / 1;
            perspective: 1000px;
            cursor: pointer;
            position: relative;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.25);
            transform-style: preserve-3d;
            border-radius: 16px;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            /* Large Emojis */
            user-select: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
        }

        /* Card Back (Hidden state) */
        .card-back {
            background: var(--card-back-grad);
            border: 1px solid rgba(0, 0, 0, 0.05);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card-back::after {
            content: "?";
            font-size: 22px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.65);
        }

        /* Card Back Hover Effect */
        .card:not(.flipped):not(.matched):hover .card-back {
            transform: scale(1.04);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08);
        }

        /* Card Front (Revealed state) */
        .card-front {
            background-color: var(--card-front-bg);
            border: 1px solid rgba(0, 0, 0, 0.02);
            transform: rotateY(180deg);
        }

        /* Matched State */
        .card.matched {
            cursor: default;
        }

        .card.matched .card-inner {
            transform: rotateY(180deg);
        }

        /* Animation Classes */
        @keyframes shake {

            0%,
            100% {
                transform: rotateY(180deg) translateX(0);
            }

            20%,
            60% {
                transform: rotateY(180deg) translateX(-6px);
            }

            40%,
            80% {
                transform: rotateY(180deg) translateX(6px);
            }
        }

        .card.shake .card-inner {
            animation: shake 0.5s ease-in-out;
        }

        @keyframes pulse {
            0% {
                transform: rotateY(180deg) scale(1);
            }

            50% {
                transform: rotateY(180deg) scale(1.08);
            }

            100% {
                transform: rotateY(180deg) scale(1);
            }
        }

        .card.pulse .card-inner {
            animation: pulse 0.5s ease-in-out;
        }

        /* Clear Message Styling */
        .clear-message {
            font-size: 16.5px;
            font-weight: 700;
            color: var(--text-color);
            text-align: center;
            min-height: 24px;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.4s ease, transform 0.4s ease;
            user-select: none;
        }

        .clear-message.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Confetti Canvas or Particles */
        .confetti {
            position: fixed;
            z-index: 9999;
            border-radius: 2px;
            pointer-events: none;
            opacity: 0.9;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% {
                transform: translateY(-20px) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(105vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .game-wrapper {
                padding: 24px 20px;
            }

            .title {
                font-size: 24px;
            }

            .grid {
                gap: 10px;
            }

            .card-face {
                font-size: 26px;
            }

            .card-back::after {
                font-size: 18px;
            }
        }
    </style>
</head>

<body>

    <div class="game-wrapper">
        <h1 class="title">간단한 퍼즐 게임</h1>
        <p class="subtitle">같은 그림 2개를 찾아 모두 맞추면 클리어입니다.</p>

        <div class="game-controls">
            <div class="attempts" id="attempts-label">시도 횟수: 0</div>
            <button class="btn-restart" id="btn-restart">다시 시작</button>
        </div>

        <div class="grid" id="game-grid">
            <!-- Cards will be dynamically generated by JS -->
        </div>

        <div class="clear-message" id="clear-message">
            <!-- Congratulations message will appear here -->
        </div>
    </div>

    <script>
        // List of emojis to pair (8 kinds, 2 of each = 16 cards)
        const EMOJIS = ['🍇', '🍓', '🥝', '🍎', '🍉', '🍊', '🍒', '🍌'];

        // DOM elements
        const gridElement = document.getElementById('game-grid');
        const attemptsLabel = document.getElementById('attempts-label');
        const btnRestart = document.getElementById('btn-restart');
        const clearMessage = document.getElementById('clear-message');

        // Game state variables
        let cards = [];
        let flippedCards = [];
        let attempts = 0;
        let matchedCount = 0;
        let isLocked = false;

        // Initialize Game
        function initGame() {
            // Reset state
            attempts = 0;
            matchedCount = 0;
            flippedCards = [];
            isLocked = false;
            attemptsLabel.textContent = `시도 횟수: ${attempts}`;
            clearMessage.classList.remove('show');
            clearMessage.textContent = '';

            // Re-create emoji list (8 pairs)
            const deck = [...EMOJIS, ...EMOJIS];

            // Shuffle
            shuffle(deck);

            // Generate DOM Grid
            gridElement.innerHTML = '';
            cards = deck.map((emoji, index) => {
                const card = createCardDOM(emoji, index);
                gridElement.appendChild(card);
                return {
                    index,
                    emoji,
                    element: card,
                    isMatched: false,
                    isFlipped: false
                };
            });
        }

        // Fisher-Yates Shuffle
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // Create Card HTML Element
        function createCardDOM(emoji, index) {
            const card = document.createElement('div');
            card.classList.add('card');
            card.dataset.index = index;

            const inner = document.createElement('div');
            inner.classList.add('card-inner');

            const back = document.createElement('div');
            back.classList.add('card-face', 'card-back');

            const front = document.createElement('div');
            front.classList.add('card-face', 'card-front');
            front.textContent = emoji;

            inner.appendChild(back);
            inner.appendChild(front);
            card.appendChild(inner);

            card.addEventListener('click', () => handleCardClick(index));

            return card;
        }

        // Handle Card Click Action
        function handleCardClick(index) {
            const cardObj = cards[index];

            // Ignore click if board is locked, card is already flipped, or card is already matched
            if (isLocked || cardObj.isFlipped || cardObj.isMatched) {
                return;
            }

            // Flip the card
            cardObj.isFlipped = true;
            cardObj.element.classList.add('flipped');
            flippedCards.push(cardObj);

            // If two cards are flipped, check for a match
            if (flippedCards.length === 2) {
                attempts++;
                attemptsLabel.textContent = `시도 횟수: ${attempts}`;
                checkMatch();
            }
        }

        // Check if the two flipped cards match
        function checkMatch() {
            isLocked = true;
            const [card1, card2] = flippedCards;

            if (card1.emoji === card2.emoji) {
                // MATCH SUCCESS
                setTimeout(() => {
                    card1.isMatched = true;
                    card2.isMatched = true;
                    card1.element.classList.add('matched');
                    card2.element.classList.add('matched');

                    // Add success animations
                    card1.element.classList.add('pulse');
                    card2.element.classList.add('pulse');

                    matchedCount += 2;
                    flippedCards = [];
                    isLocked = false;

                    // Clean up pulse class after animation finishes
                    setTimeout(() => {
                        card1.element.classList.remove('pulse');
                        card2.element.classList.remove('pulse');
                    }, 500);

                    // Check win condition
                    if (matchedCount === cards.length) {
                        handleWin();
                    }
                }, 300);
            } else {
                // MATCH FAILURE
                setTimeout(() => {
                    // Add shake animation
                    card1.element.classList.add('shake');
                    card2.element.classList.add('shake');

                    setTimeout(() => {
                        // Flip back
                        card1.isFlipped = false;
                        card2.isFlipped = false;
                        card1.element.classList.remove('flipped', 'shake');
                        card2.element.classList.remove('flipped', 'shake');

                        flippedCards = [];
                        isLocked = false;
                    }, 500); // Allow shake animation to run
                }, 500);
            }
        }

        // Handle Win State
        // 게임 승리(클리어) 상태를 처리하는 함수
        function handleWin() {
            // 1. 성공 메시지 텍스트 설정 (시도 횟수를 동적으로 반영)
            clearMessage.textContent = `축하합니다! ${attempts}번 만에 모두 맞췄습니다.`;

            // 2. 메시지 요소에 'show' 클래스를 추가하여 화면에 표시
            clearMessage.classList.add('show');

            // 3. 축하 꽃가루(콘페티) 효과 실행
            triggerConfetti();
        }

        // Confetti Celebration Effect
        function triggerConfetti() {
            const colors = ['#f43f5e', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899'];
            const container = document.body;

            for (let i = 0; i < 80; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');

                const size = Math.random() * 8 + 6; // size: 6px to 14px
                const color = colors[Math.floor(Math.random() * colors.length)];
                const left = Math.random() * 100; // random horizontal start (vw)
                const delay = Math.random() * 1.5; // random stagger delay
                const duration = Math.random() * 2 + 2; // duration 2s to 4s

                confetti.style.width = `${size}px`;
                confetti.style.height = `${size}px`;
                confetti.style.backgroundColor = color;
                confetti.style.left = `${left}vw`;
                confetti.style.top = `-20px`;
                confetti.style.animationDelay = `${delay}s`;
                confetti.style.animationDuration = `${duration}s`;
                confetti.style.transform = `rotate(${Math.random() * 360}deg)`;

                container.appendChild(confetti);

                // Clean up DOM after animation completes
                setTimeout(() => {
                    confetti.remove();
                }, (delay + duration) * 1000);
            }
        }

        // Restart Event Listener
        btnRestart.addEventListener('click', initGame);

        // Start game on load
        window.addEventListener('DOMContentLoaded', initGame);
    </script>
</body>

</html>
