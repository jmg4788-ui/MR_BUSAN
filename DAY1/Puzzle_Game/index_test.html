<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>간단한 퍼즐 게임</title>
    <!-- Google Fonts - Noto Sans KR -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Reset & Variable Definitions */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-color: #f3f5f9;
            --container-bg: #ffffff;
            --text-color: #1f2937;
            --text-muted: #6b7280;
            --primary-blue: #1a73e8;
            --primary-blue-hover: #1557b0;
            --card-back-grad: linear-gradient(135deg, #a7f3d0 0%, #86efac 100%);
            --card-front-bg: #c2f0d0;
            --font-family: 'Noto Sans KR', sans-serif;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Game Container Layout */
        .game-wrapper {
            background-color: var(--container-bg);
            border-radius: 28px;
            box-shadow: 0 16px 36px rgba(0, 0, 0, 0.04), 0 4px 12px rgba(0, 0, 0, 0.02);
            padding: 40px;
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s ease;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            color: #111827;
        }

        .subtitle {
            font-size: 14.5px;
            font-weight: 400;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 32px;
        }

        .game-controls {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .attempts {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-color);
            user-select: none;
        }

        .btn-restart {
            background-color: var(--primary-blue);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 10px 20px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            outline: none;
            box-shadow: 0 4px 6px rgba(26, 115, 232, 0.15);
        }

        .btn-restart:hover {
            background-color: var(--primary-blue-hover);
        }

        .btn-restart:active {
            transform: scale(0.96);
        }

        /* 4x4 Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            width: 100%;
            margin-bottom: 28px;
        }

        /* Card Component & Flip Effect */
        .card {
            aspect-ratio: 1 / 1;
            perspective: 1000px;
            cursor: pointer;
            position: relative;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.25);
            transform-style: preserve-3d;
            border-radius: 16px;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            /* Large Emojis */
            user-select: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
        }

        /* Card Back (Hidden state) */
        .card-back {
            background: var(--card-back-grad);
            border: 1px solid rgba(0, 0, 0, 0.05);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card-back::after {
            content: "?";
            font-size: 22px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.65);
        }

        /* Card Back Hover Effect */
        .card:not(.flipped):not(.matched):hover .card-back {
            transform: scale(1.04);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08);
        }

        /* Card Front (Revealed state) */
        .card-front {
            background-color: var(--card-front-bg);
            border: 1px solid rgba(0, 0, 0, 0.02);
            transform: rotateY(180deg);
        }

        /* Matched State */
        .card.matched {
            cursor: default;
        }

        .card.matched .card-inner {
            transform: rotateY(180deg);
        }

        /* Animation Classes */
        @keyframes shake {

            0%,
            100% {
                transform: rotateY(180deg) translateX(0);
            }

            20%,
            60% {
                transform: rotateY(180deg) translateX(-6px);
            }

            40%,
            80% {
                transform: rotateY(180deg) translateX(6px);
            }
        }

        .card.shake .card-inner {
            animation: shake 0.5s ease-in-out;
        }

        @keyframes pulse {
            0% {
                transform: rotateY(180deg) scale(1);
            }

            50% {
                transform: rotateY(180deg) scale(1.08);
            }

            100% {
                transform: rotateY(180deg) scale(1);
            }
        }

        .card.pulse .card-inner {
            animation: pulse 0.5s ease-in-out;
        }

        /* Clear Message Styling */
        .clear-message {
            font-size: 16.5px;
            font-weight: 700;
            color: var(--text-color);
            text-align: center;
            min-height: 24px;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.4s ease, transform 0.4s ease;
            user-select: none;
        }

        .clear-message.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Confetti Canvas or Particles */
        .confetti {
            position: fixed;
            z-index: 9999;
            border-radius: 2px;
            pointer-events: none;
            opacity: 0.9;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% {
                transform: translateY(-20px) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(105vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .game-wrapper {
                padding: 24px 20px;
            }

            .title {
                font-size: 24px;
            }

            .grid {
                gap: 10px;
            }

            .card-face {
                font-size: 26px;
            }

            .card-back::after {
                font-size: 18px;
            }
        }
    </style>
</head>

<body>

    <div class="game-wrapper">
        <h1 class="title">간단한 퍼즐 게임</h1>
        <p class="subtitle">같은 그림 2개를 찾아 모두 맞추면 클리어입니다.</p>

        <div class="game-controls">
            <div class="attempts" id="attempts-label">시도 횟수: 0</div>
            <button class="btn-restart" id="btn-restart">다시 시작</button>
        </div>

        <div class="grid" id="game-grid">
            <!-- Cards will be dynamically generated by JS -->
        </div>

        <div class="clear-message" id="clear-message">
            <!-- Congratulations message will appear here -->
        </div>
    </div>

    <script>
        // 1. 사용할 카드 이모지 종류 선언 (총 8개 종류, 각각 2장씩 매칭되어 총 16장)
        const EMOJIS_LIST = ['🍇', '🍓', '🥝', '🍎', '🍉', '🍊', '🍒', '🍌'];

        // 2. 화면 제어를 위해 HTML에서 가져온 DOM 요소들 (변수명은 snake_case 적용)
        const grid_element = document.getElementById('game-grid'); // 카드들이 배치될 게임 보드(그리드)
        const attempts_label = document.getElementById('attempts-label'); // 현재까지 플레이어가 시도한 횟수 라벨
        const btn_restart = document.getElementById('btn-restart'); // '다시 시작' 버튼
        const clear_message = document.getElementById('clear-message'); // 게임 클리어 축하 메시지 상자

        // 3. 게임 내부 진행 상태를 저장하는 전역 변수들 (변수명은 snake_case 적용)
        let cards_list = [];       // 전체 카드 객체들을 저장할 배열
        let flipped_cards = [];   // 현재 화면에 뒤집힌 채 확인 대기 중인 카드(최대 2장) 배열
        let attempts_count = 0;   // 플레이어의 총 시도(카드 매칭 확인) 횟수
        let matched_count = 0;    // 일치(매칭) 완료된 총 카드 개수
        let is_locked = false;     // 카드 확인 동작(애니메이션) 중 다른 카드 클릭을 방지하기 위한 잠금 상태 값

        // ==========================================
        // 4. 게임 초기화 및 생성 관련 분리된 함수들
        // ==========================================

        // [함수 분리 1] 게임 상태 및 화면 UI를 초기화하는 기능
        function reset_game_state() {
            attempts_count = 0;
            matched_count = 0;
            flipped_cards = [];
            is_locked = false;

            // 화면상의 텍스트와 표시 상태도 완전히 초기화
            attempts_label.textContent = `시도 횟수: ${attempts_count}`;
            clear_message.classList.remove('show');
            clear_message.textContent = '';
        }

        // [함수 분리 2] 8개 종류의 이모지를 복제(총 16장)하고 섞어서 무작위 덱을 만드는 기능
        function create_shuffled_deck() {
            // EMOJIS_LIST를 2개 복제하여 합친다. (총 16개의 배열 생성)
            const deck = [...EMOJIS_LIST, ...EMOJIS_LIST];
            
            // Fisher-Yates 알고리즘을 사용해 카드 덱 배열을 무작위로 섞음
            shuffle(deck);
            return deck;
        }

        // Fisher-Yates 알고리즘으로 배열의 요소를 무작위로 뒤섞는 헬퍼 함수
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                // 두 요소의 위치를 교환(Swap)
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // [함수 분리 3] 카드의 HTML(DOM) 요소를 생성하여 반환하는 기능
        function create_card_dom(emoji, index) {
            // 1) 전체 카드를 감싸는 부모 div 생성 (.card)
            const card = document.createElement('div');
            card.classList.add('card');
            card.dataset.index = index;

            // 2) 3D 플립 효과를 위한 내부 inner div 생성 (.card-inner)
            const inner = document.createElement('div');
            inner.classList.add('card-inner');

            // 3) 카드의 뒷면(기본 물음표 혹은 패턴이 있는 숨겨진 면) 생성
            const back = document.createElement('div');
            back.classList.add('card-face', 'card-back');

            // 4) 카드의 앞면(이모지가 보이는 면) 생성
            const front = document.createElement('div');
            front.classList.add('card-face', 'card-front');
            front.textContent = emoji;

            // 5) 자식 요소를 알맞게 조립하여 3차원 카드 컴포넌트 완성
            inner.appendChild(back);
            inner.appendChild(front);
            card.appendChild(inner);

            // 6) 각 카드를 누를 때 매칭 판정 핸들러가 실행되도록 이벤트 바인딩
            card.addEventListener('click', () => handle_card_click(index));

            return card;
        }

        // [함수 분리 4] 덱 데이터를 바탕으로 화면에 그리드 카드를 부착하고 상태 리스트를 채우는 기능
        function render_game_grid(deck) {
            // 기존에 배치되어 있던 카드를 완전히 제거
            grid_element.innerHTML = '';
            
            // deck 배열의 정보를 돌면서 각각 카드 DOM을 만들고 화면에 부착
            cards_list = deck.map((emoji, index) => {
                const card_dom = create_card_dom(emoji, index);
                grid_element.appendChild(card_dom);
                
                // cards_list 배열에 저장될 카드 상태 정보 객체 반환
                return {
                    index: index,
                    emoji: emoji,
                    element: card_dom,
                    is_matched: false,
                    is_flipped: false
                };
            });
        }

        // [기본 실행 함수] 게임 실행 또는 다시 시작 버튼 클릭 시 작동하는 통합 초기화 로직
        function init_game() {
            reset_game_state();                   // 1단계: 점수판, 변수 초기화
            const deck = create_shuffled_deck();  // 2단계: 셔플된 이모지 덱 가져오기
            render_game_grid(deck);               // 3단계: 화면에 그리고 상태 보관
        }

        // ==========================================
        // 5. 카드 뒤집기 및 이벤트 처리 관련 분리된 함수들
        // ==========================================

        // [함수 분리 5] 특정 카드를 클릭했을 때 뒤집을 수 있는 조건인지 검사하는 기능
        function can_flip_card(card_obj) {
            // 아래 세 조건 중 하나라도 해당되면 뒤집을 수 없음 (클릭 무시)
            // 1. 이미 2장이 뒤집혀 매칭 대기 중인 잠금 상태(is_locked)일 때
            // 2. 이미 뒤집힌 상태(is_flipped)인 카드를 다시 누를 때
            // 3. 이미 정답을 맞춘 상태(is_matched)인 카드를 누를 때
            if (is_locked || card_obj.is_flipped || card_obj.is_matched) {
                return false;
            }
            return true;
        }

        // [함수 분리 6] 카드를 뒤집어서 화면에 효과를 보여주고 상태를 갱신하는 기능
        function flip_card(card_obj) {
            card_obj.is_flipped = true;
            card_obj.element.classList.add('flipped'); // CSS에 연동된 3D 뒤집기 효과 적용
            flipped_cards.push(card_obj);             // 검사용 뒤집힌 카드 목록에 보관
        }

        // [함수 분리 7] 뒤집힌 카드가 2장일 때 시도 횟수를 가산하고 비교 처리를 수행하는 기능
        function check_and_process_match() {
            if (flipped_cards.length === 2) {
                // 시도 횟수 누적 및 UI 텍스트 갱신
                attempts_count++;
                attempts_label.textContent = `시도 횟수: ${attempts_count}`;
                
                // 두 카드가 일치하는지 판별하는 핵심 비교 함수 호출
                check_match();
            }
        }

        // [핵심 핸들러] 사용자가 특정 카드를 눌렀을 때 진행되는 메인 클릭 핸들러
        function handle_card_click(index) {
            const card_obj = cards_list[index];

            // 1) 조건 검사: 카드를 뒤집을 수 있는지 판단
            if (!can_flip_card(card_obj)) {
                return;
            }

            // 2) 기능 처리: 카드를 화면상에 뒤집음
            flip_card(card_obj);

            // 3) 매칭 처리: 2장이 뒤집혔는지 검사 후 일치 연산 진행
            check_and_process_match();
        }

        // ==========================================
        // 6. 카드 일치(매칭) 여부 판정 관련 분리된 함수들
        // ==========================================

        // [함수 분리 8] 두 카드가 일치했을 때 성공 연출 및 상태 처리를 수행하는 기능
        function handle_match_success(card1, card2) {
            // 카드의 일치 상태 설정
            card1.is_matched = true;
            card2.is_matched = true;
            
            // 맞춘 카드 상태 표시를 위한 CSS 클래스 추가
            card1.element.classList.add('matched');
            card2.element.classList.add('matched');

            // 성공적으로 맞췄음을 알리는 둥둥 뜨는 애니메이션 클래스 추가 (.pulse)
            card1.element.classList.add('pulse');
            card2.element.classList.add('pulse');

            // 맞춘 카드 개수 누적
            matched_count += 2;
            
            // 매칭 정보 초기화 및 보드 잠금 해제
            flipped_cards = [];
            is_locked = false;

            // 0.5초 후에 pulse 애니메이션 클래스를 제거 (다음 액션 시 걸림 없도록 정리)
            setTimeout(() => {
                card1.element.classList.remove('pulse');
                card2.element.classList.remove('pulse');
            }, 500);

            // 보드의 모든 카드를 다 맞췄다면 게임 클리어 함수 실행
            if (matched_count === cards_list.length) {
                handle_win();
            }
        }

        // [함수 분리 9] 두 카드가 다를 때 실패 연출(흔들림) 후 원상복귀하는 기능
        function handle_match_failure(card1, card2) {
            // 카드가 틀렸음을 보여주는 흔들림 애니메이션 클래스 추가 (.shake)
            card1.element.classList.add('shake');
            card2.element.classList.add('shake');

            // 0.5초 동안 흔들리는 연출이 다 끝난 시점에 원상태로 되돌림
            setTimeout(() => {
                // 뒤집기 상태 복원
                card1.is_flipped = false;
                card2.is_flipped = false;
                
                // 뒤집힘 효과와 흔들림 효과 클래스 일괄 제거
                card1.element.classList.remove('flipped', 'shake');
                card2.element.classList.remove('flipped', 'shake');

                // 매칭 정보 초기화 및 보드 잠금 해제
                flipped_cards = [];
                is_locked = false;
            }, 500);
        }

        // [일치 판별] 두 장의 뒤집힌 카드의 이모지를 검사하는 제어 함수
        function check_match() {
            // 애니메이션이 끝나고 카드가 복원되거나 성공 처리될 동안 사용자가 다른 카드를 누르지 못하게 차단
            is_locked = true;
            
            const [card1, card2] = flipped_cards;

            // 0.3~0.5초의 미세한 딜레이를 주어 플레이어가 틀림/맞춤을 눈으로 먼저 인지하게 함
            if (card1.emoji === card2.emoji) {
                // 이모지가 같다면 일치 성공 처리 함수 실행
                setTimeout(() => {
                    handle_match_success(card1, card2);
                }, 300);
            } else {
                // 이모지가 다르다면 일치 실패 처리 함수 실행
                setTimeout(() => {
                    handle_match_failure(card1, card2);
                }, 500);
            }
        }

        // ==========================================
        // 7. 게임 승리(클리어) 연출 관련 분리된 함수들
        // ==========================================

        // [게임 완료] 게임 승리 상태에 진입했을 때 UI 노출 및 연출 실행 함수
        function handle_win() {
            // 1) 승리 메시지 영역에 시도 횟수를 포함해 문구 설정
            clear_message.textContent = `축하합니다! ${attempts_count}번 만에 모두 맞췄습니다.`;

            // 2) CSS의 .show 클래스를 입혀 성공 모달이 자연스럽게 투명도가 차오르며 나타나게 함
            clear_message.classList.add('show');

            // 3) 화면 전체에 꽃가루를 날려 축하 효과를 줌
            trigger_confetti();
        }

        // [함수 분리 10] 꽃가루 하나하나를 동적으로 생성하여 애니메이션 속성들을 부여하는 기능
        function create_confetti_piece(colors, container) {
            const confetti = document.createElement('div');
            confetti.classList.add('confetti');

            // 랜덤 크기, 색상, 배치 위치, 애니메이션 지연/실행 시간 설정
            const size = Math.random() * 8 + 6; // 6px ~ 14px 무작위 크기
            const color = colors[Math.floor(Math.random() * colors.length)]; // 무작위 색상
            const left = Math.random() * 100; // 가로 시작 위치 (0vw ~ 100vw)
            const delay = Math.random() * 1.5; // 시작 지연 시간 (0초 ~ 1.5초)
            const duration = Math.random() * 2 + 2; // 낙하 소요 시간 (2초 ~ 4초)

            // 조각 엘리먼트 스타일 바인딩
            confetti.style.width = `${size}px`;
            confetti.style.height = `${size}px`;
            confetti.style.backgroundColor = color;
            confetti.style.left = `${left}vw`;
            confetti.style.top = `-20px`; // 화면 상단 바깥쪽에서 시작
            confetti.style.animationDelay = `${delay}s`;
            confetti.style.animationDuration = `${duration}s`;
            confetti.style.transform = `rotate(${Math.random() * 360}deg)`; // 임의의 방향으로 회전

            container.appendChild(confetti);

            // 꽃가루가 바닥 아래로 낙하를 완전히 끝냈을 때 DOM에서 안전하게 삭제하여 메모리 누수 방지
            setTimeout(() => {
                confetti.remove();
            }, (delay + duration) * 1000);
        }

        // [꽃가루 연출] 화면 내 80개의 축하용 꽃가루(콘페티)를 뿌려주는 함수
        function trigger_confetti() {
            const colors = ['#f43f5e', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899'];
            const container = document.body;

            // 80번 반복하여 개별 꽃가루 조각을 동적으로 생성하고 추가함
            for (let i = 0; i < 80; i++) {
                create_confetti_piece(colors, container);
            }
        }

        // ==========================================
        // 8. 이벤트 등록 및 브라우저 온로드 처리
        // ==========================================

        // 다시 시작 버튼 클릭 이벤트 등록
        btn_restart.addEventListener('click', init_game);

        // 브라우저 돔 트리가 구성되는 즉시 첫 게임 로딩 실행
        window.addEventListener('DOMContentLoaded', init_game);
    </script>
</body>

</html>
